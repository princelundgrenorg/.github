name: Bug report
description: Something is broken or behaving unexpectedly.
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. The more
        of these fields you can fill in, the faster the issue can
        be triaged and fixed.

        **Security issue?** Please don't post it here — see
        [SECURITY.md](https://github.com/princelundgrenorg/.github/blob/main/SECURITY.md)
        for the private channel.

  - type: input
    id: app-version
    attributes:
      label: App version
      description: From the app's About window (e.g. `v1.2.3`).
      placeholder: "v1.2.3"
    validations:
      required: true

  - type: input
    id: macos-version
    attributes:
      label: macOS version
      description: From `Apple menu → About This Mac` (e.g. "macOS 26.1").
      placeholder: "macOS 26.1"
    validations:
      required: true

  - type: dropdown
    id: hardware
    attributes:
      label: Mac hardware
      options:
        - Apple Silicon (M-series)
        - Intel
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the actual behavior you observed.
    validations:
      required: true

  - type: textarea
    id: what-expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: |
        Numbered list works best. The more specific the better.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      description: |
        Logs, screenshots, screen recordings, related apps that
        might interfere. Drop them here.
